name: Build, Test & Release CloseWindows

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then
            npm init -y
            npm install --save-dev wasmoon
          else
            npm ci || npm install
          fi

      - name: Run tests
        run: node test/run_tests.js

  release:
    name: Build & Release Extension
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Extension Package
        run: |
          mkdir -p out
          zip -r out/CloseWindows.ext extension.xml campaign graphics scripts
          echo "Extension successfully packaged."

      - name: Generate Release Notes
        run: |
          echo "Automated release of CloseWindows extension." > release_notes.md
          echo "Version: ${GITHUB_REF_NAME}" >> release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" out/CloseWindows.ext \
            --title "${{ github.ref_name }}" \
            --notes-file release_notes.md
